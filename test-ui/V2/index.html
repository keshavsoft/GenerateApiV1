<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <link href="styles.css" rel="stylesheet">
</head>

<body style="margin:0; font-family:sans-serif; background:#0f172a; color:white;">

    <div style="
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
  ">

        <div style="
  width:400px;
  background:rgba(30,41,59,0.8);
  padding:30px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
">

            <h1 style="margin-bottom:10px;">🚀 AI Schema Generator</h1>

            <p style="color:#cbd5f5; margin-bottom:20px;">
                Instantly generate your project structure.
            </p>

            <button id="create" style="
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  color:white;
  cursor:pointer;
  font-weight:600;
  transition:0.2s;
" onmouseover="this.style.transform='scale(1.03)'" onmouseout="this.style.transform='scale(1)'">
                Create Schema
            </button>
        </div>

    </div>

</body>

</html>
